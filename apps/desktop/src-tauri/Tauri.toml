# lanecho 桌面端 Tauri 应用配置
#
# 键名统一 camelCase(Tauri 配置的规范主名, kebab-case 只是别名):
# tauri-action 等外围工具只认 camelCase, 用 kebab-case 会导致
# productName 读取失败、产物名回退成 crate 名而使 Release 上传找不到文件。
# (deskmate 实战教训, 直接继承)

# 产品名: 窗口标题栏、安装包与可执行文件名
productName = "lanecho"
# 应用版本
version = "../package.json"
# 应用唯一标识 —— 固定不可改(数据目录随它派生, deskmate 有分裂教训)
identifier = "io.github.zlx2019.lanecho"

[build]
beforeDevCommand = "pnpm dev"
devUrl = "http://localhost:1420"
beforeBuildCommand = "pnpm build"
frontendDist = "../dist"

# 内容安全策略(打包版生效, dev 下 Tauri 自动放宽):
# 默认仅允许自身资源; 图片放行 data:(内联图标);
# style 需 unsafe-inline(React 行内样式 + Tailwind 注入); Tauri 会自动追加 IPC 所需项
[app.security]
csp = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'"

[[app.windows]]
# 窗口标题
title = "lanecho"
# 单设置窗: 比 deskmate 雷达窗小一号
width = 760
height = 600
minWidth = 640
minHeight = 480

[[app.windows]]
# 历史浮窗(方案 14.5): 无边框、置顶、失焦即隐, 快捷键/托盘唤起
label = "panel"
title = "lanecho history"
width = 380
height = 480
resizable = false
decorations = false
alwaysOnTop = true
visible = false
skipTaskbar = true

[bundle]
active = true
# 按平台明确产物: macOS app+dmg / Windows nsis / Linux appimage+deb
targets = ["app", "dmg", "nsis", "appimage", "deb"]
publisher = "zlx2019"
copyright = "Copyright © 2026 zlx2019"
category = "Utility"
shortDescription = "局域网共享剪贴板"
longDescription = "lanecho 是一个局域网共享剪贴板桌面应用: 无中心服务端, 设备双向配对后, 任一台复制内容其余设备即时跟随, 全程 TLS 加密。"
# 应用图标(assets/icon-1024.png 为源图, 经 `pnpm tauri icon` 生成全套)
icon = [
  "icons/32x32.png",
  "icons/128x128.png",
  "icons/128x128@2x.png",
  "icons/icon.icns",
  "icons/icon.ico",
]

[bundle.macos]
# WKWebView 与本地网络权限行为以 Catalina 为基线
minimumSystemVersion = "10.15"

[bundle.windows.nsis]
# 装机级安装(防火墙规则注册需要管理员权限): lanecho 与 deskmate 同样有
# 入站 TCP 监听 + UDP 组播发现, 入站被默认拦截会让设备发现静默失败
installMode = "perMachine"
# 安装/卸载钩子: 自动注册与清理防火墙入站规则(方案风险表项)
installerHooks = "windows/hooks.nsh"

[bundle.linux.deb]
# mDNS 发现与托盘在 GNOME 下的常见运行时依赖由 Tauri 自动推导, 此处无需额外声明
